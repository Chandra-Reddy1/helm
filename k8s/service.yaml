apiVersion: v1
kind: Service
metadata:
  name: nginx-demo
spec:
  type: NodePort             # ✅ changed from LoadBalancer (works better on Minikube)
  selector:
    app: nginx-demo          # ✅ now matches pod label
  ports:
  - port: 5000
    targetPort: 5000         # ✅ points to Flask port
    nodePort: 30500          # ✅ fixed external port (optional, remove to auto-assign)
