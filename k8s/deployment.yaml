apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-demo          # ✅ matches template label below
  template:
    metadata:
      labels:
        app: nginx-demo        # ✅ consistent label
    spec:
      containers:
      - name: nginx-image
        image: chandra219/welcome-login-app:66
        ports:
        - containerPort: 5000  # ✅ Flask runs on 5000
